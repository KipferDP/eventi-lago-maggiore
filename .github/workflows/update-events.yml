name: Events aktualisieren

# Läuft automatisch jeden Tag um 04:00 UTC (06:00 Schweizer Zeit)
# und kann jederzeit von Hand gestartet werden (Actions -> Run workflow).
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "data.js"
      - "events.json"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Events holen (Scraper)
        run: python scraper.py --lang de

      - name: Änderungen committen (falls vorhanden)
        run: |
          git config user.name "events-bot"
          git config user.email "events-bot@users.noreply.github.com"
          git add data.js events.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen – nichts zu committen."
          else
            git commit -m "Events aktualisiert (automatisch)"
            git push
          fi
