<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d6e8c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon.png">
<title>Eventi Lago Maggiore</title>
<style>
  :root{
    --blue:#0d6e8c; --teal:#14a3b8; --bg:#f4f6f7; --card:#fff;
    --ink:#1d2b30; --muted:#6b7c82; --sun:#f2b134;
    --shadow:0 6px 20px rgba(13,110,140,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);overscroll-behavior:none;
    padding-bottom:env(safe-area-inset-bottom)}
  .app{max-width:480px;margin:0 auto;min-height:100vh}

  header{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;
    padding:calc(env(safe-area-inset-top) + 18px) 20px 0;position:sticky;top:0;z-index:20;
    box-shadow:0 4px 14px rgba(10,84,104,.25)}
  .brand{display:inline-flex;align-items:center;gap:7px;font-size:13px;letter-spacing:.5px;opacity:.95;text-transform:uppercase;cursor:pointer;padding:2px 0}
  .brand:active{opacity:.7}
  h1{font-size:25px;font-weight:800;margin:4px 0 14px;letter-spacing:-.5px}
  .tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;text-align:center;padding:10px 15px;border-radius:11px 11px 0 0;font-weight:700;
    font-size:14px;cursor:pointer;background:rgba(255,255,255,.14);color:rgba(255,255,255,.85);transition:.15s;
    white-space:nowrap}
  .tab.active{background:var(--bg);color:var(--blue)}
  .count{font-size:11px;font-weight:600;opacity:.7}

  .searchbtn{position:absolute;top:calc(env(safe-area-inset-top) + 16px);right:18px;
    width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;
    color:#fff;z-index:25;transition:.15s}
  .searchbtn:active{transform:scale(.92)}
  .searchbar{display:none;align-items:center;gap:8px;padding:10px 14px;background:var(--card);
    border-bottom:1px solid #e4e9ea;position:sticky;top:0;z-index:18;box-shadow:var(--shadow)}
  .searchbar.open{display:flex}
  .searchbar input{flex:1;border:1.5px solid #d3dadd;border-radius:12px;padding:11px 14px;
    font-size:15px;outline:none;background:#fff;color:var(--ink)}
  .searchbar input:focus{border-color:var(--teal)}
  .searchbar .x{font-size:16px;font-weight:800;color:var(--muted);cursor:pointer;padding:8px 10px}
  .citychip{position:absolute;top:10px;right:10px;background:var(--blue);color:#fff;font-size:11px;
    font-weight:800;padding:5px 10px;border-radius:20px;box-shadow:0 2px 6px rgba(0,0,0,.2)}

  .list{padding:16px 14px 36px}
  .card{background:var(--card);border-radius:16px;margin-bottom:13px;overflow:hidden;
    box-shadow:var(--shadow);cursor:pointer;transition:transform .12s}
  .card:active{transform:scale(.98)}
  .card .img{height:130px;position:relative;background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;font-size:46px;color:#fff}
  .badge{position:absolute;top:10px;left:10px;color:#fff;font-size:11px;font-weight:800;
    padding:5px 10px;border-radius:20px;letter-spacing:.3px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .top{position:absolute;top:10px;right:10px;background:var(--sun);color:#5c3d00;font-size:11px;
    font-weight:800;padding:5px 9px;border-radius:20px}
  .card .body{padding:12px 14px 14px}
  .card h3{font-size:17px;font-weight:800;line-height:1.25;margin-bottom:6px}
  .meta{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;margin-top:3px}
  .meta .ic{width:15px;text-align:center}
  .date-pill{display:inline-block;background:var(--sun);color:#5c3d00;font-weight:800;
    font-size:12px;padding:3px 9px;border-radius:8px;margin-bottom:8px}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}

  .detail{position:fixed;inset:0;background:var(--bg);z-index:40;max-width:480px;margin:0 auto;
    transform:translateX(100%);transition:transform .25s cubic-bezier(.3,.7,.3,1);overflow-y:auto}
  .detail.open{transform:translateX(0)}
  .detail .hero{height:250px;background-size:cover;background-position:center;position:relative;
    display:flex;align-items:center;justify-content:center;font-size:84px;color:#fff}
  .back{position:absolute;top:calc(env(safe-area-inset-top) + 12px);left:14px;background:rgba(255,255,255,.95);
    height:40px;padding:0 16px 0 11px;border-radius:22px;display:inline-flex;align-items:center;gap:4px;
    font-size:16px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;color:var(--ink);z-index:5}
  .back b{font-size:22px;line-height:1;margin-top:-2px}
  .sheet{background:var(--bg);border-radius:22px 22px 0 0;margin-top:-22px;position:relative;
    padding:22px 20px 40px;min-height:55vh}
  .d-badge{display:inline-block;font-size:12px;font-weight:800;padding:5px 12px;border-radius:20px;color:#fff;margin-bottom:10px}
  .detail h2{font-size:24px;font-weight:800;line-height:1.2;margin-bottom:14px}
  .info-row{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-bottom:1px solid #e4e9ea}
  .info-row .ic{font-size:20px;width:26px;text-align:center;margin-top:1px}
  .info-row .t{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .info-row .v{font-size:15px;font-weight:600;margin-top:2px}
  .cta{display:block;text-align:center;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;
    font-weight:800;font-size:16px;padding:16px;border-radius:14px;text-decoration:none;box-shadow:var(--shadow);margin-top:18px}
  .cta.ghost{background:#fff;color:var(--blue);border:2px solid var(--blue);box-shadow:none;margin-top:10px}

  .foot{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:rgba(29,43,48,.92);
    color:#fff;text-align:center;font-size:11px;padding:7px;z-index:60;letter-spacing:.3px}

  .live{display:inline-block;background:#e23b3b;color:#fff;font-weight:800;font-size:12px;
    padding:3px 9px;border-radius:8px;margin-bottom:8px;margin-left:6px}
  /* Über-Event-Kennzeichnung */
  .parent{display:inline-flex;align-items:center;gap:5px;background:#eef3f4;color:var(--blue);
    font-weight:800;font-size:12px;padding:4px 10px;border-radius:8px;margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="searchbtn" id="searchbtn" onclick="toggleSearch()" title="Events durchsuchen">🔍</div>
    <div class="brand" onclick="goHome()" title="Zur Startseite (Ascona)">🏠 Eventi · Lago Maggiore</div>
    <h1 id="title">Agenda Ascona</h1>
    <div class="tabs">
      <div class="tab active" data-city="ascona" onclick="switchCity('ascona')">Ascona <span class="count" id="c-ascona"></span></div>
      <div class="tab" data-city="locarno" onclick="switchCity('locarno')">Locarno <span class="count" id="c-locarno"></span></div>
      <div class="tab" data-city="minusio" onclick="switchCity('minusio')">Minusio <span class="count" id="c-minusio"></span></div>
      <div class="tab" data-city="tenero" onclick="switchCity('tenero')">Tenero <span class="count" id="c-tenero"></span></div>
      <div class="tab" data-city="orselina" onclick="switchCity('orselina')">Orselina <span class="count" id="c-orselina"></span></div>
      <div class="tab" data-city="muralto" onclick="switchCity('muralto')">Muralto <span class="count" id="c-muralto"></span></div>
    </div>
  </header>
  <div class="searchbar" id="searchbar">
    <input id="searchinput" type="search" placeholder="Alle Events durchsuchen…" oninput="renderSearch(this.value)">
    <span class="x" onclick="toggleSearch()">Abbrechen</span>
  </div>
  <div class="list" id="list"></div>
</div>

<div class="detail" id="detail">
  <div class="hero" id="d-hero"><div class="back" onclick="closeDetail()"><b>‹</b> Zurück</div></div>
  <div class="sheet">
    <span class="d-badge" id="d-badge"></span>
    <h2 id="d-title"></h2>
    <div class="info-row" id="d-parent-row" style="display:none"><div class="ic">🎪</div><div><div class="t">Teil von</div><div class="v" id="d-parent"></div></div></div>
    <div class="info-row"><div class="ic">📅</div><div><div class="t">Datum</div><div class="v" id="d-date"></div></div></div>
    <div class="info-row"><div class="ic">📍</div><div><div class="t">Ort</div><div class="v" id="d-loc"></div></div></div>
    <div class="info-row"><div class="ic">🏷️</div><div><div class="t">Kategorie</div><div class="v" id="d-cat"></div></div></div>
    <a class="cta" href="#" id="d-link" target="_blank">Mehr Infos / Tickets</a>
    <a class="cta ghost" href="#" id="d-map" target="_blank">Auf Karte zeigen 🗺️</a>
  </div>
</div>

<div class="foot" id="foot">Daten: Ticino Turismo</div>

<script src="data.js"></script>
<script>
const COLORS={musik:'#7b3fb8',festival:'#e8743b',kultur:'#c0392b',tradition:'#a04000',
  ausstellung:'#2471a3',sport:'#1e8449',kulinarik:'#d68910',fuehrung:'#16859e',
  natur:'#27ae60',markt:'#16a085',kino:'#8e44ad',wellness:'#0e9aa7',
  kinder:'#e67e22',kurs:'#2c7be5',event:'#5d6d7e'};
const ICONS={musik:'🎵',festival:'🎪',kultur:'🎭',tradition:'🎉',ausstellung:'🖼️',
  sport:'🏃',kulinarik:'🍷',fuehrung:'🧭',natur:'🌿',markt:'🛍️',
  kino:'🎬',wellness:'🧘',kinder:'🧸',kurs:'🎓',event:'📅'};

// Echte Daten aus data.js (vom Scraper). Fallback: leer.
const DATA = (window.EVENT_DATA && window.EVENT_DATA.events) || {ascona:[],locarno:[],minusio:[],tenero:[],orselina:[],muralto:[]};
const UPDATED = (window.EVENT_DATA && window.EVENT_DATA.updated) || '';
// Reihenfolge + Anzeigenamen + Cover pro Stadt (Ascona zuerst = Startseite)
const CITIES=['ascona','locarno','minusio','tenero','orselina','muralto'];
const CITY_NAME={ascona:'Ascona',locarno:'Locarno',minusio:'Minusio',tenero:'Tenero',orselina:'Orselina',muralto:'Muralto'};
const COVER={ascona:'ascona-cover.jpg',locarno:'locarno-cover.jpg',minusio:'minusio-cover.jpg',tenero:'tenero-cover.jpg',orselina:'orselina-cover.jpg',muralto:'muralto-cover.jpg'};
let current='ascona';

function color(c){return COLORS[c]||COLORS.event;}
function icon(c){return ICONS[c]||ICONS.event;}
function coverOf(city){return COVER[city]||'locarno-cover.jpg';}

function render(){
  let items=[...(DATA[current]||[])];
  // Sortierung auf Tagesebene: HEUTE startende Events zuerst, dann bereits
  // laufende (vor heute begonnen), dann die kommenden nach Datum.
  const t0=new Date(); t0.setHours(0,0,0,0); const today=t0.getTime();
  const dayOf=ms=>{const d=new Date(ms||0); d.setHours(0,0,0,0); return d.getTime();};
  const effDay=e=>Math.max(dayOf(e.sortKey), today);
  items.sort((a,b)=>{
    const da=effDay(a), db=effDay(b);
    if(da!==db) return da-db;                       // nach (effektivem) Tag
    const oa=dayOf(a.sortKey)<today?1:0, ob=dayOf(b.sortKey)<today?1:0;
    if(oa!==ob) return oa-ob;                        // heute-startende vor laufenden
    return (a.sortKey||0)-(b.sortKey||0);
  });

  CITIES.forEach(c=>{const el=document.getElementById('c-'+c); if(el) el.textContent=(DATA[c]||[]).length;});

  const list=document.getElementById('list');
  if(!items.length){list.innerHTML='<div class="empty">Keine Events gefunden.</div>';return;}
  const cover=coverOf(current);
  list.innerHTML=items.map(e=>{
    const c=color(e.cat);
    const ongoing=dayOf(e.sortKey)<today;
    const bg=e.image?`background-image:url('${e.image}')`:`background-image:url('${cover}')`;
    return `<div class="card" onclick="openDetail('${current}','${e.id}')">
      <div class="img" style="${bg}">
        <span class="badge" style="background:${c}">${icon(e.cat)} ${e.catLabel}</span>
        ${e.isTop?'<span class="top">★ TOP</span>':''}
      </div>
      <div class="body">
        <span class="date-pill">${e.dateText}</span>${ongoing?'<span class="live">● läuft</span>':''}
        <h3>${e.title}</h3>
        ${e.parent?`<div class="parent">🎪 Teil von: ${e.parent}</div>`:''}
        <div class="meta"><span class="ic">📍</span>${e.loc}</div>
      </div>
    </div>`;
  }).join('');
}

function switchCity(city){
  if(searching) closeSearch();
  current=city;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.city===city));
  document.getElementById('title').textContent='Agenda '+(CITY_NAME[city]||city);
  render(); window.scrollTo(0,0);
}

// Home: von überall (Suche, anderer Ort, Detailseite) zurück zum Startbildschirm (Ascona)
function goHome(){
  document.getElementById('detail').classList.remove('open');
  searching=false;
  document.getElementById('searchbar').classList.remove('open');
  switchCity('ascona');
}

// ---- Suche über alle Orte ----
let searching=false;
function toggleSearch(){ searching ? closeSearch() : openSearch(); }
function openSearch(){
  searching=true;
  document.getElementById('searchbar').classList.add('open');
  const inp=document.getElementById('searchinput'); inp.value='';
  document.getElementById('title').textContent='Suche';
  renderSearch(''); window.scrollTo(0,0); setTimeout(()=>inp.focus(),50);
}
function closeSearch(){
  searching=false;
  document.getElementById('searchbar').classList.remove('open');
  document.getElementById('title').textContent='Agenda '+(CITY_NAME[current]||current);
  render(); window.scrollTo(0,0);
}
function allEvents(){
  const arr=[];
  CITIES.forEach(c=>(DATA[c]||[]).forEach(e=>arr.push(Object.assign({_city:c},e))));
  return arr;
}
function renderSearch(q){
  q=(q||'').trim().toLowerCase();
  let items=allEvents();
  if(q) items=items.filter(e=>((e.title||'')+' '+(e.loc||'')+' '+(e.catLabel||'')+' '+(CITY_NAME[e._city]||'')+' '+(e.parent||'')).toLowerCase().includes(q));
  items.sort((a,b)=>(a.sortKey||0)-(b.sortKey||0));
  const list=document.getElementById('list');
  if(!items.length){list.innerHTML='<div class="empty">Keine Treffer.</div>';return;}
  list.innerHTML=items.map(e=>{
    const c=color(e.cat);
    const bg=e.image?`background-image:url('${e.image}')`:`background-image:url('${coverOf(e._city)}')`;
    return `<div class="card" onclick="openDetail('${e._city}','${e.id}')">
      <div class="img" style="${bg}">
        <span class="badge" style="background:${c}">${icon(e.cat)} ${e.catLabel}</span>
        <span class="citychip">${CITY_NAME[e._city]}</span>
      </div>
      <div class="body">
        <span class="date-pill">${e.dateText}</span>
        <h3>${e.title}</h3>
        <div class="meta"><span class="ic">📍</span>${e.loc}</div>
      </div>
    </div>`;
  }).join('');
}

function openDetail(city,id){
  const e=(DATA[city]||[]).find(x=>x.id===id); if(!e)return;
  const c=color(e.cat);
  const cover=coverOf(city);
  const hero=document.getElementById('d-hero');
  hero.style.cssText = `background-image:url('${e.image||cover}')`;
  hero.innerHTML=`<div class="back" onclick="closeDetail()"><b>‹</b> Zurück</div>`;
  const b=document.getElementById('d-badge'); b.textContent=icon(e.cat)+' '+e.catLabel; b.style.background=c;
  document.getElementById('d-title').textContent=e.title;
  const prow=document.getElementById('d-parent-row');
  if(e.parent){prow.style.display='flex';document.getElementById('d-parent').textContent=e.parent;}
  else{prow.style.display='none';}
  const t0=new Date(); t0.setHours(0,0,0,0);
  const live=(e.sortKey||0)<t0.getTime();
  document.getElementById('d-date').innerHTML=e.dateText+(live?' <span style="color:#e23b3b;font-weight:800">● läuft</span>':'');
  document.getElementById('d-loc').textContent=e.loc;
  document.getElementById('d-cat').textContent=e.catLabel;
  const link=document.getElementById('d-link');
  if(e.link){link.style.display='block';link.href=e.link;}else{link.style.display='none';}
  const map=document.getElementById('d-map');
  if(e.lat&&e.lng){map.style.display='block';map.href=`https://www.google.com/maps/search/?api=1&query=${e.lat},${e.lng}`;}
  else{map.style.display='none';}
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){document.getElementById('detail').classList.remove('open');}

if(UPDATED) document.getElementById('foot').textContent='Daten: Ticino Turismo · Stand '+UPDATED;
render();

// Während der Entwicklung KEIN Service Worker / kein Offline-Cache:
// vorhandene Worker abmelden und Caches löschen -> App lädt immer frisch.
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
  if(window.caches) caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});
}
</script>
</body>
</html>
